# Diagnóstico al arrancar (URL JDBC, current_database, si existe public.usuarios). Quitar o poner false cuando ya no haga falta.
app.log-jdbc-info=true

# --- Base de datos (Neon PostgreSQL) ---
# Si Swagger sigue diciendo que no existe "usuarios", compara esta URL con la del panel de Neon (mismo host ep-... y /neondb).
# Las variables SPRING_DATASOURCE_* del sistema o del IDE SOBRESCRIBEN este archivo.
spring.datasource.url=jdbc:postgresql://ep-rough-frog-amwhmtxk-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_MoekrEH0Lca3

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- JWT (clave de ejemplo; minimo 32 caracteres) ---
